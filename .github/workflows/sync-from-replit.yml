name: Sync project from Replit

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/sync-from-replit.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out GitHub repository
        uses: actions/checkout@v4

      - name: Clone Replit project
        run: |
          rm -rf /tmp/replit-source
          git clone --depth 1 "https://replit.com/@jesussavedmina/Medicine-Support-Hub.git" /tmp/replit-source

      - name: Copy clean project files
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          rsync -a \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='*.tsbuildinfo' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='attached_assets/Egyptian_Medicines_Database_*.xlsx' \
            /tmp/replit-source/ ./

      - name: Commit synchronized files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync Medicine Support Hub from Replit"
            git push origin main
          fi
