name: Platform Health and Safe Maintenance

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: platform-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck build and repository validation
        run: pnpm run validate

  production-smoke-test:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check production routes and machine-readable resources
        shell: bash
        run: |
          set -euo pipefail
          base="https://medicine-support-hub.vercel.app"
          routes=(
            "/"
            "/medicines"
            "/verified-products"
            "/companies"
            "/industry"
            "/generics"
            "/diseases"
            "/network"
            "/integrations"
            "/marketplace"
            "/physician"
            "/admin/marketplace"
            "/search"
            "/llms.txt"
            "/sitemap.xml"
            "/robots.txt"
          )
          for route in "${routes[@]}"; do
            code=$(curl --silent --show-error --location --retry 3 --retry-delay 2 --output /dev/null --write-out "%{http_code}" "$base$route")
            echo "$route -> $code"
            test "$code" -ge 200 -a "$code" -lt 400
          done

  safe-database-maintenance:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Refresh derived company profiles and verification signals
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Supabase maintenance secrets are not configured; safely skipping database maintenance."
            exit 0
          fi
          curl --fail-with-body --silent --show-error --retry 3 \
            "$SUPABASE_URL/rest/v1/rpc/run_safe_platform_maintenance" \
            -X POST \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}'

  escalate-failure:
    if: failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs: [validate, production-smoke-test, safe-database-maintenance]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `Automated platform health failure: ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              'The scheduled Medicine Support Hub health workflow detected a failure.',
              '',
              `Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: ${context.sha}`,
              '',
              'Review build/type errors, production route checks, and safe-maintenance output before changing production data or code.',
              'This automation intentionally reports failures instead of making unsupervised code or clinical-data changes.'
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-health',
              per_page: 20
            });
            const issue = existing.data.find(item => item.title.startsWith('Automated platform health failure:'));
            if (issue) {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, body});
            } else {
              await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['automated-health']});
            }
