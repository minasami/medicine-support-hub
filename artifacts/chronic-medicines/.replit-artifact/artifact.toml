kind = "web"
previewPath = "/"
title = "Chronic Medicines Support"
version = "1.0.0"
id = "artifacts/chronic-medicines"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25867

[services.development]
run = "pnpm --filter @workspace/chronic-medicines run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chronic-medicines", "run", "build" ]
publicDir = "artifacts/chronic-medicines/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25867"
BASE_PATH = "/"
