<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b1f33" />
  <title>Medicine Support Hub — Offline</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f8fafc;color:#0b1f33;font-family:Inter,system-ui,sans-serif;padding:24px;box-sizing:border-box}
    main{max-width:560px;border:1px solid #cbd5e1;border-radius:24px;background:white;padding:32px;box-shadow:0 18px 60px rgba(15,23,42,.12)}
    .icon{width:64px;height:64px;border-radius:18px;background:#0b1f33;color:white;display:grid;place-items:center;font-size:32px;font-weight:700}
    h1{font-size:28px;margin:20px 0 10px}p{line-height:1.65;color:#475569}button{border:0;border-radius:12px;background:#0ea5e9;color:white;padding:12px 18px;font-weight:700;cursor:pointer}
  </style>
</head>
<body><main><div class="icon">M</div><h1>You are offline</h1><p>Medicine Support Hub could not reach the network. Previously opened pages and cached resources may still be available. Reconnect before relying on current medicine prices, availability, company information, or support status.</p><button onclick="location.reload()">Try again</button></main></body>
</html>
